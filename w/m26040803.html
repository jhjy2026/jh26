<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>图文展示页</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 基础重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #bfbfbf;
    }

    /* 顶部横栏题图 */
    .header-banner {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 导航栏 */
    nav {
      background-color: #8B4513;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      padding: 10px 15px;
      font-size: 16px;
    }

    nav a:hover {
      background-color: #555;
    }

	        h4 {
            margin-top: 2.2em;
            font-size: 2rem;
            letter-spacing: 2px;
			text-align:center;
			color: red;
			}


    /* 主内容区 */
    .content {
      max-width: 1200px;
      margin: 0px auto;
      padding: 0 35px;
	  padding-top: 30px;
	  padding-bottom: 200px;
	  background-color: #f9f9f9;
    }

    .article-title {
      font-size: 2.1em;
      margin: 40px;
	  color:red;
	  text-align:center;
    }

    .article-meta {
      color: #666;
      font-size: 16px;
      margin-bottom: 40px;
	  text-align:center;
    }

    .article-body p {
line-height: 1.5; 
margin: 0px; 
text-indent: 2em;
text-align: left;
font-size: 1.2em;
    }

    .article-body img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 20px 0;
    }

/* 以下三段为picture的CSS代码 */
picture, picture img {
  display: block;
  width: 100%;
  height: auto;
}

/* 针对特定题图容器 */
.hero-banner picture {
  width: 100%;
  max-height: 80vh;
  overflow: hidden;
}

.hero-banner img {
  object-fit: cover;
  object-position: center;
}

    /* 底部横栏 */
    .footer-banner {
      width: 100%;
      height: auto;
      display: block;
      margin-top: 30px;
    }

    footer {
      background-color: #8B4513;
      color: #fff;
      text-align: center;
      padding: 30px;
      font-size: 14px;
    }

    /* 响应式适配 */
    @media screen and (max-width: 768px) {
      .article-title {
        font-size: 20px;
      }

      nav a {
        font-size: 14px;
        padding: 8px 10px;
      }
    }
  </style>
</head>
<body>

  <!-- 顶部横栏题图 -->
  <!--  <img class="header-banner" src="../p/00000957485686y.jpg" alt="顶部题图"> -->

<picture>
  <!-- 手机竖屏：使用裁剪后的方形/竖版图 -->
  <source 
    media="(max-width: 768px) and (orientation: portrait)"
    srcset="../p/00000957485686yx.jpg"
  >
  
  <!-- 手机横屏/平板 -->
  <source 
    media="(max-width: 1024px)"
    srcset="../p/00000957485686yy.jpg"
  >
  
  <!-- 桌面宽屏 -->
  <source 
    media="(min-width: 1920px)"
    srcset="../p/00000957485686y.jpg"
  >
  
  <!-- 默认桌面 -->
  <img 
    src="../p/00000957485686y.jpg" 
    alt="题图"
    style="width: 100%; height: auto;"
  >
</picture>


  <!-- 导航栏（五个字栏目） -->
  <nav>
    <a href="http://www.wmdjy.top/jh2/#home">首页</a>
    <a href="http://www.wmdjy.top/jh2/#photo">摄影</a>
    <a href="http://www.wmdjy.top/jh2/#music">歌唱</a>
    <a href="http://www.wmdjy.top/jh2/#poetry">诵读</a>
    <a href="#">关于</a>
  </nav>

  <!-- 主内容区 -->
  <div class="content">
    <h1 class="article-title">摄影班《春到雨山湖》采风活动</h1>
    <p class="article-meta">摄影班 &nbsp;|&nbsp; 发布日期：2026-04-08</p>
    
    <div class="article-body">
      <p>新学期摄影班第一次课，全体学员赴春天的雨山湖公园摄影采风。</p>
      
       <img src="../p/2026/20260323105525_52_1920c.jpg" alt="摄影班采风">
      
      	  
    </div>
  </div>

  <!-- 页脚 -->
  <footer>
    © 2026 金晖网站 版权所有
  </footer>

</body>
</html>
