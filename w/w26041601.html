<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="content-type" content="text/html; charset=utf-8">
  <title>图文展示页</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 基础重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #bfbfbf;
    }

    /* 顶部横栏题图 */
    .header-banner {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 导航栏 */
    nav {
      background-color: #8B4513;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      padding: 10px 15px;
      font-size: 16px;
    }

    nav a:hover {
      background-color: #555;
    }

	        h4 {
            margin-top: 2.2em;
            font-size: 2rem;
            letter-spacing: 2px;
			text-align:center;
			color: red;
			}


    /* 主内容区 */
    .content {
      max-width: 1200px;
      margin: 0px auto;
      padding: 0 35px;
	  padding-top: 30px;
	  padding-bottom: 200px;
	  background-color: #f9f9f9;
    }

    .article-title {
      font-size: 2.1em;
      margin: 40px;
	  color:red;
	  text-align:center;
    }

    .article-meta {
      color: #666;
      font-size: 16px;
      margin-bottom: 40px;
	  text-align:center;
    }

    .article-body p {
line-height: 1.5; 
margin: 0px; 
text-indent: 2em;
text-align: left;
font-size: 1.2em;
    }

 /* 为让图文中的图片居中显示，作以下调整增加 */
.article-body img {
  max-width: 100%;
  height: auto;
  display: block;           /* 让图片变成块级元素，才能用 margin auto 居中 */
  margin-left: auto;        /* 左边距自动 */
  margin-right: auto;       /* 右边距自动 */
  margin-top: 20px;
  margin-bottom: 20px;
  }
  
  /* 视频样式：自适应 + 居中 */
.article-body figure video {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;
  background-color: #000;   /* 视频未播放时背景更干净 */
}

 /* 为增加图片下方文字说明，建立图片容器 */	
	/* 图片容器：居中显示 */
.article-body figure {
  max-width: 100%;
  margin: 20px auto;        /* 上下留白，左右自动居中 */
  text-align: center;       /* 内部元素居中（包括 figcaption） */
}

/* 图片本身 */
.article-body figure img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;           /* 图片自身居中（可选，因为父元素已居中） */
}

/* 图片说明文字 */
.article-body figcaption {
  margin-top: 8px;
  font-size: 14px;
  color: #666;
  font-style: italic;
  text-align: center;       /* 说明文字居中 */
}

/* 以下三段为picture的css代码 */
picture, picture img {
  display: block;
  width: 100%;
  height: auto;
}

/* 针对特定题图容器 */
.hero-banner picture {
  width: 100%;
  max-height: 80vh;
  overflow: hidden;
}

.hero-banner img {
  object-fit: cover;
  object-position: center;
}



    /* 底部横栏 */
    .footer-banner {
      width: 100%;
      height: auto;
      display: block;
      margin-top: 30px;
    }

    footer {
      background-color: #8B4513;
      color: #fff;
      text-align: center;
      padding: 30px;
      font-size: 14px;
    }

    /* 响应式适配 */
    @media screen and (max-width: 768px) {
      .article-title {
        font-size: 20px;
      }

      nav a {
        font-size: 14px;
        padding: 8px 10px;
      }
    }
  </style>
</head>
<body>

  <source

    srcset="../p/00000957485686yx.jpg"
  >
  
  <!-- 手机横屏/平板 -->
  <source 
    media="(max-width: 1024px)"
    srcset="../p/00000957485686yy.jpg"
  >
  
  <!-- 桌面宽屏 -->
  <source 
    media="(min-width: 1920px)"
    srcset="../p/00000957485686y.jpg"
  >
  
  <!-- 默认桌面 -->
  <img 
    src="../p/00000957485686y.jpg" 
    alt="题图"
    style="width: 100%; height: auto;"
  >
</picture>

<div class="article-body">
  <p>《立春》以诗意笔触描绘春日盛景：枝芽初绽、繁花似锦、春雨淅沥，勾勒出大地回春、万物复苏的迷人画卷。歌曲旋律轻柔灵动，洋溢生生不息、奋发向上的新春朝气，让人感受到世间万象更新的盎然生机。2026年中央广播电视总台春节联欢晚会现场，周慧敏等十位歌手共同首演了这首歌曲。<p>这学期，音乐班的学员们在秦老师的带领下，认真排练了这首歌曲。</p>
