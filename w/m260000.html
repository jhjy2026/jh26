	        h4 {

			}


    /* 主内容区 */
    .content {
      max-width: 1200px;
      margin: 0px auto;
      padding: 0 35px;

    }

    .article-title {
      font-size: 2.1em;
      margin: 40px;

    }

    .article-meta {

      font-size: 16px;
      margin-bottom: 40px;
	  text-align:center;
    }

    .article-body p {
line-height: 1.5; 
margin: 0px; 
text-indent: 2em;
text-align: left;
font-size: 1.2em;
    }

    .article-body img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 20px 0;
    }

    /* 底部横栏 */
    .footer-banner {
      width: 100%;
      height: auto;
      display: block;
      margin-top: 30px;
    }

    footer {
      background-color: #8B4513;
      color: #fff;
      text-align: center;
      padding: 30px;
      font-size: 14px;
    }

    /* 响应式适配 */
    @media screen and (max-width: 768px) {
      .article-title {
        font-size: 20px;
      }

      nav a {
        font-size: 14px;
        padding: 8px 10px;
      }
    }
