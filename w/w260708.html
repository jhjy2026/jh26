    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 1. PC端基础防护
            document.body.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });
            document.body.addEventListener('dragstart', function(e) {
                e.preventDefault();
            });
            const clearSelection = function() {
                if (window.getSelection) {
                    window.getSelection().removeAllRanges();
                }
            };
            document.body.addEventListener('copy', clearSelection);
            document.body.addEventListener('mouseup', clearSelection);

            // 2. 【移动端修复版】精细化触摸事件拦截
            let startY = 0;
            let isScrolling = false;

            // 记录手指按下的初始 Y 轴坐标
            document.body.addEventListener('touchstart', function(e) {
                startY = e.touches[0].clientY;
                isScrolling = false;
            }, { passive: true }); // 使用 passive: true 提升滚动性能

            // 监听手指移动，判断是否为滑动操作
            document.body.addEventListener('touchmove', function(e) {
                const currentY = e.touches[0].clientY;
                const deltaY = Math.abs(currentY - startY);

                // 如果手指移动距离超过 10px，判定为滑动，允许默认滚动行为
                if (deltaY > 10) {
                    isScrolling = true;
                    return; 
                }

                // 如果移动距离很小，判定为长按或点击，阻止默认行为（防复制）
                if (!isScrolling) {
                    e.preventDefault();
                }
            }, { passive: false });

            // 3. 触摸结束时，如果判定为滑动则清空选区作为双重保险
            document.body.addEventListener('touchend', function() {
                if (isScrolling) {
                    clearSelection();
                }
            });
        });
    </script>
